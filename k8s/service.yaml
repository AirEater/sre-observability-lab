apiVersion: v1
kind: Service
metadata:
  name: sre-app
  namespace: sre-demo
  labels:
    app: sre-app
spec:
  type: ClusterIP
  selector:
    app: sre-app
  ports:
    - name: http       # ← named port, 后面的 ServiceMonitor 会写 `port: http` 来告诉 Prometheus 抓哪个端口
      port: 8000
      targetPort: 8000