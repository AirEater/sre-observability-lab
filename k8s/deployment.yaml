apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-demo
  labels:
    app: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      initContainers:
        - name: init-check
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Validating prerequisites..."; sleep 2; echo "OK"']
      containers:
        - name: sre-app
          image: 446988881266.dkr.ecr.ap-southeast-1.amazonaws.com/sre-observability-demo:v1
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: sre-app-config
            - secretRef:
                name: sre-app-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
        - name: log-tail
          image: busybox:1.36
          command: ['sh', '-c', 'tail -f /var/log/app/app.log 2>/dev/null || sleep infinity']
          volumeMounts:
            - name: app-logs
              mountPath: /var/log/app
      volumes:
        - name: app-logs
          emptyDir: {}